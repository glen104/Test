<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gemini API Test</title>
    <style>
        body { background: #06090f; color: white; font-family: monospace; padding: 40px; }
        #result { margin-top: 20px; padding: 20px; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; white-space: pre-wrap; font-size: 0.9rem; line-height: 1.6; }
        .ok { color: #00c853; }
        .err { color: #da3633; }
        button { background: #003087; color: white; border: none; padding: 12px 30px; border-radius: 6px; cursor: pointer; font-size: 1rem; font-weight: bold; }
        button:hover { background: #0041b8; }
    </style>
</head>
<body>
    <h2>Gemini API → NCO CWD Status Test</h2>
    <button onclick="runTest()">RUN TEST</button>
    <div id="result">Click RUN TEST to begin...</div>

<script>
const GEMINI_KEY = 'AIzaSyB8UUppHh8PoqgZBoJi-xBps4LIgd3_G7I';

async function runTest() {
    const out = document.getElementById('result');
    out.innerHTML = 'Fetching...';

    try {
        const resp = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`,
            {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    tools: [{ google_search: {} }],
                    contents: [{
                        role: 'user',
                        parts: [{ text: 'Fetch https://www.nco.ncep.noaa.gov/status/cwd/ and return ONLY a raw JSON object, no markdown: {"status": "NORMAL or Enhanced Caution or Critical Weather Day", "outlookText": "brief outlook narrative", "days": [{"weekday": "Saturday", "date": "May 17", "status": "Normal", "hazards": ["Severe Thunderstorms"]}]}' }]
                    }]
                })
            }
        );

        if (!resp.ok) {
            const err = await resp.json();
            out.innerHTML = '<span class="err">API ERROR ' + resp.status + ':\n' + JSON.stringify(err, null, 2) + '</span>';
            return;
        }

        const data = await resp.json();
        const text = data.candidates?.[0]?.content?.parts?.map(p => p.text || '').join('\n') || '';
        const clean = text.replace(/```json|```/g, '').trim();
        const match = clean.match(/\{[\s\S]*\}/);

        if (match) {
            const parsed = JSON.parse(match[0]);
            out.innerHTML = '<span class="ok">✓ SUCCESS\n\n' + JSON.stringify(parsed, null, 2) + '</span>';
        } else {
            out.innerHTML = '<span class="err">Got response but could not parse JSON:\n\n</span>' + text;
        }

    } catch(e) {
        out.innerHTML = '<span class="err">FETCH FAILED:\n' + e.message + '</span>';
    }
}
</script>
</body>
</html>
