<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCO CWD Outlook</title>
    <!-- BUILD: 2026-05-17 17:20 UTC -->
    <style>
        :root {
            --bg: #06090f;
            --panel: #0d1117;
            --border: #1e2530;
            --nws-blue: #003087;
            --cyan: #00e5ff;
            --normal: #00c853;
            --caution: #FF9800;
            --critical: #da3633;
            --text-dim: #4a5568;
            --text-mid: #8b949e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── HEADER ── */
        .header {
            background: white;
            border-bottom: 4px solid var(--nws-blue);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .header-left img { height: 44px; }
        .header-title {
            color: var(--nws-blue);
            font-weight: 900;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-left: 5px solid var(--nws-blue);
            padding-left: 14px;
            line-height: 1.1;
        }
        .header-title span {
            display: block;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 3px;
            color: #586069;
            margin-top: 2px;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .sync-badge {
            font-size: 0.65rem;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--nws-blue);
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .sync-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #999;
            flex-shrink: 0;
        }
        .sync-dot.live { background: var(--normal); animation: pulse 2s infinite; }
        .sync-dot.fetching { background: var(--cyan); animation: blink 0.6s infinite; }
        .sync-dot.error { background: var(--critical); }
        @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(0,200,83,.6)} 50%{box-shadow:0 0 0 6px rgba(0,200,83,0)} }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

        .updated-text {
            font-size: 0.65rem;
            color: #8b949e;
            letter-spacing: 1px;
            font-style: italic;
        }

        /* ── CURRENT STATUS BAR ── */
        .status-bar {
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            background: #080b10;
        }
        .status-label {
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-mid);
        }
        .status-value {
            font-size: 1.1rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .status-value.normal { color: var(--normal); }
        .status-value.caution { color: var(--caution); }
        .status-value.critical { color: var(--critical); }

        .outlook-text {
            font-size: 0.8rem;
            color: var(--text-mid);
            font-style: italic;
            border-left: 2px solid var(--border);
            padding-left: 12px;
            line-height: 1.4;
            flex: 1;
        }

        /* ── MAIN GRID ── */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 16px 20px;
            gap: 12px;
            overflow: hidden;
        }

        .section-title {
            font-size: 0.65rem;
            font-weight: 800;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 4px;
        }

        /* ── DAY CARDS ── */
        .days-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 10px;
            flex-shrink: 0;
        }

        .day-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px 16px;
            position: relative;
            overflow: hidden;
            border-top: 4px solid var(--border);
            transition: border-top-color 0.3s;
        }
        .day-card.normal { border-top-color: var(--normal); }
        .day-card.caution { border-top-color: var(--caution); }
        .day-card.critical { border-top-color: var(--critical); }

        .day-card::before {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .day-card.critical::before { background: linear-gradient(135deg, rgba(218,54,51,0.06), transparent); opacity: 1; }
        .day-card.caution::before { background: linear-gradient(135deg, rgba(255,152,0,0.06), transparent); opacity: 1; }
        .day-card.normal::before { background: linear-gradient(135deg, rgba(0,200,83,0.04), transparent); opacity: 1; }

        .day-name {
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-mid);
            margin-bottom: 4px;
        }
        .day-date {
            font-size: 0.85rem;
            font-weight: 700;
            color: white;
            margin-bottom: 10px;
        }
        .day-status {
            font-size: 1rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .day-card.normal .day-status { color: var(--normal); }
        .day-card.caution .day-status { color: var(--caution); }
        .day-card.critical .day-status { color: var(--critical); }

        .day-icons {
            margin-top: 8px;
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }
        .day-icon {
            font-size: 0.65rem;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 20px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .icon-storm { background: rgba(218,54,51,0.2); color: #ff6b6b; border: 1px solid rgba(218,54,51,0.3); }
        .icon-fire { background: rgba(255,152,0,0.2); color: #ffa040; border: 1px solid rgba(255,152,0,0.3); }
        .icon-flood { background: rgba(0,229,255,0.15); color: var(--cyan); border: 1px solid rgba(0,229,255,0.25); }
        .icon-winter { background: rgba(100,180,255,0.15); color: #a0c8ff; border: 1px solid rgba(100,180,255,0.25); }

        /* ── HAZARD SUMMARY ── */
        .hazards-box {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px 16px;
            flex: 1;
            overflow-y: auto;
        }
        .hazard-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }
        .hazard-row:last-child { border-bottom: none; }
        .hazard-icon-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--cyan);
            margin-top: 5px;
            flex-shrink: 0;
        }
        .hazard-text { font-size: 0.82rem; color: #c9d1d9; line-height: 1.5; }
        .hazard-label { font-weight: 700; color: white; margin-right: 6px; }

        /* ── LOADING / ERROR ── */
        .loading-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            color: var(--text-dim);
        }
        .spinner {
            width: 28px; height: 28px;
            border: 3px solid var(--border);
            border-top-color: var(--cyan);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text {
            font-size: 0.75rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* ── FOOTER ── */
        .footer {
            padding: 6px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            background: #080b10;
        }
        .footer-left { font-size: 0.65rem; color: var(--text-dim); letter-spacing: 1px; }
        .footer-right a {
            font-size: 0.65rem;
            color: var(--text-dim);
            text-decoration: none;
            letter-spacing: 1px;
        }
        .footer-right a:hover { color: var(--cyan); }

        /* corner accents on cards */
        .corner { position: absolute; width: 10px; height: 10px; }
        .corner.tl { top: 0; left: 0; border-top: 2px solid; border-left: 2px solid; }
        .corner.br { bottom: 0; right: 0; border-bottom: 2px solid; border-right: 2px solid; }
        .day-card.normal .corner { border-color: var(--normal); }
        .day-card.caution .corner { border-color: var(--caution); }
        .day-card.critical .corner { border-color: var(--critical); }
        .day-card:not(.normal):not(.caution):not(.critical) .corner { border-color: var(--border); }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-left">
            <img src="https://water.noaa.gov/assets/styles/public/images/noaa-logo.svg" alt="NOAA">
            <img src="https://water.noaa.gov/assets/styles/public/images/nws-logo.svg" alt="NWS">
            <div class="header-title">
                CWD Outlook
                <span>NCO · NCEP Central Operations</span>
            </div>
        </div>
        <div class="header-right">
            <div class="updated-text" id="updated-text">--</div>
            <div class="sync-badge">
                <div class="sync-dot fetching" id="sync-dot"></div>
                <span id="sync-text">SYNCING</span>
            </div>
        </div>
    </div>

    <div class="status-bar">
        <div class="status-label">Current Status:</div>
        <div class="status-value" id="current-status">—</div>
        <div class="outlook-text" id="outlook-text">Fetching outlook from NCO...</div>
    </div>

    <div class="main" id="main-content">
        <div class="loading-state" id="loading-state">
            <div class="spinner"></div>
            <div class="loading-text">Fetching CWD Data</div>
        </div>
    </div>

    <div class="footer">
        <div class="footer-left">AUTO-REFRESHES DAILY · DATA VIA NCO/NCEP</div>
        <div class="footer-right">
            <a href="https://www.nco.ncep.noaa.gov/status/cwd/" target="_blank">SOURCE: nco.ncep.noaa.gov →</a>
        </div>
    </div>

<script>
const STATUS_JSON_URL = 'https://glen104.github.io/nwc-status/status.json';
const REFRESH_MS = 30 * 60 * 1000; // 30 minutes
let lastFetchDate = null;

function statusClass(s) {
    if (!s) return '';
    const u = s.toUpperCase();
    if (u.includes('CRITICAL') || u.includes('CWD')) return 'critical';
    if (u.includes('CAUTION') || u.includes('ECE')) return 'caution';
    if (u.includes('NORMAL')) return 'normal';
    return '';
}

function statusLabel(s) {
    if (!s) return '—';
    const u = s.toUpperCase();
    if (u.includes('CRITICAL') || u.includes('CWD')) return 'CRITICAL WEATHER DAY';
    if (u.includes('CAUTION') || u.includes('ECE')) return 'ENHANCED CAUTION';
    if (u.includes('NORMAL')) return 'NORMAL';
    return s.toUpperCase();
}

function setSyncState(state) {
    const dot = document.getElementById('sync-dot');
    const txt = document.getElementById('sync-text');
    dot.className = 'sync-dot ' + state;
    txt.innerText = state === 'live' ? 'LIVE' : state === 'fetching' ? 'SYNCING' : 'ERROR';
}

function buildDayCard(day) {
    const cls = statusClass(day.status);
    const icons = (day.hazards || []).map(h => {
        return '<img src="https://www.nco.ncep.noaa.gov/status/css/images/icon-' + h + '.png" style="width:28px;height:28px;vertical-align:middle;" alt="' + h + '">';
    }).join(' ');

    return `
        <div class="day-card ${cls}">
            <div class="corner tl"></div>
            <div class="corner br"></div>
            <div class="day-name">${day.weekday || ''}</div>
            <div class="day-date">${day.date || ''}</div>
            <div class="day-status">${statusLabel(day.status)}</div>
            <div class="day-icons">${icons}</div>
        </div>`;
}

function buildHazardRow(text) {
    return `<div class="hazard-row">
        <div class="hazard-icon-dot"></div>
        <div class="hazard-text">${text}</div>
    </div>`;
}

function renderData(data) {
    // Current status — status.json uses 'status' not 'currentStatus'
    const currentStatus = data.status || data.currentStatus || 'NORMAL';
    const csEl = document.getElementById('current-status');
    const cls = statusClass(currentStatus);
    csEl.className = 'status-value ' + cls;
    csEl.innerText = statusLabel(currentStatus);

    // Outlook text
    document.getElementById('outlook-text').innerText = data.outlookText || '';

    // Build day cards + hazards
    const main = document.getElementById('main-content');
    const days = data.days || [];
    const hazards = data.hazardSummary || [];

    let html = '';

    if (days.length) {
        html += '<div class="section-title">Day-by-Day Outlook</div>';
        html += '<div class="days-grid">';
        days.forEach(d => { html += buildDayCard(d); });
        html += '</div>';
    }

    if (hazards.length) {
        html += '<div class="section-title" style="margin-top:4px;">Active Hazards</div>';
        html += '<div class="hazards-box">';
        hazards.forEach(h => { html += buildHazardRow(h); });
        html += '</div>';
    }

    main.innerHTML = html || '<div class="loading-state"><div class="loading-text">No outlook data available</div></div>';

    // Updated timestamp
    const now = new Date();
    document.getElementById('updated-text').innerText = 
        'Updated ' + now.toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'}) + 
        ' · ' + now.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'});

    setSyncState('live');
    lastFetchDate = now.toDateString();
}

async function fetchCWDOutlook() {
    setSyncState('fetching');
    try {
        const resp = await fetch(STATUS_JSON_URL + '?cb=' + Date.now());
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const data = await resp.json();
        renderData(data);
    } catch(e) {
        console.error('CWD fetch failed:', e);
        setSyncState('error');
        document.getElementById('updated-text').innerText = 'Fetch failed — retrying';
        document.getElementById('main-content').innerHTML = `
            <div class="loading-state">
                <div class="loading-text" style="color:#da3633;">Fetch Error</div>
                <div style="font-size:0.75rem; color:#586069; text-align:center; margin-top:8px;">
                    Could not load status.json<br>
                    <a href="https://www.nco.ncep.noaa.gov/status/cwd/" target="_blank"
                       style="color:#00e5ff; text-decoration:none; letter-spacing:1px;">
                        → Open NCO CWD Page Directly
                    </a>
                </div>
            </div>`;
    }
}

// Only re-fetch if it's a new day OR first load
function checkAndFetch() {
    const today = new Date().toDateString();
    if (lastFetchDate !== today) {
        fetchCWDOutlook();
    }
}

// Initial fetch
fetchCWDOutlook();

// Check hourly — will only actually re-fetch on a new calendar day
setInterval(checkAndFetch, REFRESH_MS);
</script>
    <div style="position:fixed;bottom:6px;right:10px;font-size:0.6rem;color:rgba(255,255,255,0.2);font-family:monospace;pointer-events:none;">BUILD: 2026-05-17 17:20 UTC</div>
</body>
</html>
